name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  plumbing-tests:
    name: Plumbing tests (no embedding model)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Verify degraded-mode detection works
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from arn.core.embeddings import EmbeddingEngine
          e = EmbeddingEngine(use_model=True)
          assert e.is_degraded, 'Should be degraded without sentence-transformers'
          print('OK: degraded mode correctly detected')
          "

      - name: Run plumbing tests (expects semantic tests to skip)
        run: |
          python -m pip install -e ".[dev]"
          python tests/test_all.py

  full-tests:
    name: Full test suite (with embedding model)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-cache-${{ runner.os }}-minilm-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Environment check
        run: python tests/check_env.py

      - name: Run full test suite
        run: python tests/test_all.py

  # API server smoke test temporarily removed — arn.api module being ported to v1.0 structure
  # Will be re-added in next release
